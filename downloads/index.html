<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Downloads | JustKeepGoing</title>
  <meta name="description" content="JustKeepGoing 앱 다운로드 페이지" />
  <link rel="stylesheet" href="./styles.css?v=2" />
</head>

<body>
  <main class="wrap">
    <section class="hero">
      <div class="badge">Downloads</div>
      <h1 class="title">앱 다운로드</h1>
      <p class="subtitle">JustKeepGoing의 최신 모바일 앱을 다운로드하고 경험해 보세요.</p>
    </section>

    <!-- App List -->
    <div class="app-list" id="appList">
      <a href="./raceballs/" class="app-list-item" style="text-decoration: none; color: inherit;">
        <img class="list-app-icon" src="./raceballs/icon.png" alt="RaceBalls icon"
          onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\'></svg>'; this.style.background='#2a2f4c';">
        <span class="list-app-name">RaceBalls</span>
      </a>
      <a href="./dutchpay/" class="app-list-item" style="text-decoration: none; color: inherit;">
        <img class="list-app-icon" src="./dutchpay/icon.png" alt="더치페이 icon"
          onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\'></svg>'; this.style.background='#2a2f4c';">
        <span class="list-app-name">더치페이</span>
      </a>
    </div>

    <footer>© 2025 JustKeepGoing · App Downloads</footer>
  </main>
</body>

</html>
